{% extends 'base.html' %}

{% block content %}
  <h1>Delete {{ product.name }}</h1>
  <p>Are you sure you want to remove this product from inventory?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Yes, delete</button>
    <a class="btn btn-secondary" href="{% url 'inventory:product_detail' product.pk %}">Cancel</a>
  </form>
{% endblock %}
